name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: revora
          POSTGRES_PASSWORD: revora_pass
          POSTGRES_DB: revora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: cd backend && ruff check .

      - name: Check formatting with black
        run: cd backend && black --check .

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://revora:revora_pass@localhost:5432/revora_test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci-not-real-32-chars!!
          APP_ENV: testing
        run: cd backend && python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Check alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://revora:revora_pass@localhost:5432/revora_test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci-not-real-32-chars!!
        run: cd backend && alembic upgrade head
