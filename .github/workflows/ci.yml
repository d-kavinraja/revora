name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: revora
          POSTGRES_PASSWORD: revora_pass
          POSTGRES_DB: revora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Detect changed Python files
        id: changed-python
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- backend | grep -E '\.py$' > changed_python_files.txt || true

          if [ -s changed_python_files.txt ]; then
            echo "has_python_changes=true" >> "$GITHUB_OUTPUT"
            tr '\n' ' ' < changed_python_files.txt | sed 's/[[:space:]]*$//' > changed_python_files_args.txt
          else
            echo "has_python_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint with ruff
        if: steps.changed-python.outputs.has_python_changes == 'true'
        run: cd backend && ruff check $(cat ../changed_python_files_args.txt)

      - name: Check formatting with black
        if: steps.changed-python.outputs.has_python_changes == 'true'
        run: cd backend && black --check $(cat ../changed_python_files_args.txt)

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://revora:revora_pass@localhost:5432/revora_test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci-not-real-32-chars!!
          APP_ENV: testing
        run: cd backend && python -m pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Check alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://revora:revora_pass@localhost:5432/revora_test
          SECRET_KEY: test-secret-key-for-ci
          JWT_SECRET_KEY: test-jwt-key-for-ci
          ENCRYPTION_KEY: test-encryption-key-for-ci-not-real-32-chars!!
        run: cd backend && alembic upgrade head
